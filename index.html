<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Swipe · Logout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0d;
      --surface: #141416;
      --surface2: #1c1c1f;
      --border: #2a2a2e;
      --border-subtle: #1f1f23;
      --text: #e8e8ea;
      --text-muted: #5a5a62;
      --text-dim: #3a3a42;
      --accent: #c8f060;
      --accent-dim: rgba(200, 240, 96, 0.08);
      --accent-border: rgba(200, 240, 96, 0.2);
      --in-color: #60d0f0;
      --out-color: #f06090;
      --warn-color: #f0a060;
      --warn-dim: rgba(240, 160, 96, 0.08);
      --warn-border: rgba(240, 160, 96, 0.25);
      --radius: 10px;
      --radius-sm: 6px;
    }

    html { font-size: 15px; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container { max-width: 680px; margin: 0 auto; }

    /* Header */
    .header { margin-bottom: 40px; }
    .header-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
    }
    .header h1 span { color: var(--accent); }
    .tz-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px 3px 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .tz-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Input area */
    .input-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .input-block:focus-within {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px rgba(200, 240, 96, 0.04);
    }
    .input-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .input-label-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .sample-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: color 0.15s;
      padding: 2px 0;
    }
    .sample-btn:hover { color: var(--accent); }

    textarea {
      display: block;
      width: 100%;
      height: 200px;
      background: transparent;
      border: none;
      outline: none;
      resize: vertical;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text);
      padding: 14px;
      caret-color: var(--accent);
    }
    textarea::placeholder { color: var(--text-dim); }

    /* Actions */
    .actions { margin-top: 12px; }
    .calc-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0c0c0d;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .calc-btn:hover { opacity: 0.88; }
    .calc-btn:active { transform: scale(0.99); }

    /* Output */
    #output {
      margin-top: 28px;
      display: none;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: border-color 0.3s, background 0.3s;
    }
    .stat-card.featured {
      background: var(--accent-dim);
      border-color: var(--accent-border);
      grid-column: span 2;
    }

    /* Countdown card states */
    .stat-card.countdown-card {
      position: relative;
      overflow: hidden;
    }
    .stat-card.countdown-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    .stat-card.countdown-card.warn {
      border-color: var(--warn-border);
      background: var(--warn-dim);
    }
    .stat-card.countdown-card.warn .stat-value {
      color: var(--warn-color);
    }
    .stat-card.countdown-card.warn .stat-label {
      color: var(--warn-color);
      opacity: 0.6;
    }
    .stat-card.countdown-card.done {
      border-color: rgba(240, 96, 144, 0.3);
      background: rgba(240, 96, 144, 0.06);
    }
    .stat-card.countdown-card.done .stat-value {
      color: var(--out-color);
    }

    /* Ticking animation on the countdown digits */
    @keyframes tickFlash {
      0%   { opacity: 1; }
      45%  { opacity: 1; }
      50%  { opacity: 0.55; }
      55%  { opacity: 1; }
      100% { opacity: 1; }
    }
    .ticking { animation: tickFlash 1s step-end infinite; }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      transition: color 0.3s;
    }
    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.35rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
      transition: color 0.3s;
    }
    .stat-card.featured .stat-value {
      color: var(--accent);
      font-size: 1.6rem;
    }
    .stat-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Progress bar under countdown */
    .progress-track {
      margin-top: 10px;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width 1s linear, background 0.4s;
      width: 0%;
    }
    .warn .progress-fill  { background: var(--warn-color); }
    .done .progress-fill  { background: var(--out-color); width: 100% !important; }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--out-color);
      color: #0c0c0d;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      padding: 14px 28px;
      border-radius: 40px;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(240, 96, 144, 0.35);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Timeline */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 24px 0 10px;
    }
    .timeline {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .tl-row {
      display: grid;
      grid-template-columns: 90px 1fr 100px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-subtle);
      align-items: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      transition: background 0.12s;
    }
    .tl-row:last-child { border-bottom: none; }
    .tl-row:hover { background: var(--surface2); }
    .tl-row.header-row {
      background: var(--surface2);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .tl-row.header-row:hover { background: var(--surface2); }
    .tl-type { font-weight: 500; }
    .tl-type.in  { color: var(--in-color); }
    .tl-type.out { color: var(--out-color); }
    .tl-type.span { color: var(--text-muted); font-style: italic; }
    .tl-ts  { color: var(--text); }
    .tl-dur { color: var(--text-muted); text-align: right; }
  </style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="header-eyebrow">attendance tool</div>
    <h1>Swipe <span>Logout</span></h1>
    <div class="tz-badge">
      <span class="tz-dot"></span>
      <span id="tzLabel"></span>
    </div>
  </header>

  <div class="input-block">
    <div class="input-label">
      <span class="input-label-text">Swipe log</span>
      <button class="sample-btn" id="sampleBtn">load sample ↗</button>
    </div>
    <textarea id="inputArea" placeholder="Paste your swipe log here…"></textarea>
  </div>

  <div class="actions">
    <button class="calc-btn" id="calcBtn">Calculate logout time</button>
  </div>

  <div id="output">
    <div class="stats-grid">
      <div class="stat-card featured">
        <div class="stat-label">Projected Logout</div>
        <div class="stat-value" id="logout">—</div>
      </div>

      <!-- Countdown card -->
      <div class="stat-card countdown-card" id="countdownCard" style="grid-column: span 2;">
        <div class="stat-label">Time Till Logout</div>
        <div class="stat-value" id="countdown">—</div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-label">First IN</div>
        <div class="stat-value" id="firstIn">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Worked</div>
        <div class="stat-value" id="worked">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Required Work</div>
        <div class="stat-value" id="requiredWork">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Time Outside</div>
        <div class="stat-value" id="outside">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Still to Work</div>
        <div class="stat-value" id="remaining">—</div>
        <div class="stat-sub" id="remainingMin"></div>
      </div>
    </div>

    <div class="section-label">Event timeline</div>
    <div class="timeline">
      <div class="tl-row header-row">
        <span>Type</span><span>Timestamp</span><span style="text-align:right">Duration</span>
      </div>
      <div id="timelineBody"></div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast">🚪 Time to logout!</div>

<script>
  let countdownInterval = null;
  let logoutTarget = null;
  let dayStartTime = null;
  let alreadyAlerted = false;

  document.getElementById('tzLabel').textContent =
    Intl.DateTimeFormat().resolvedOptions().timeZone || 'local';

  const sampleText = `Swipes (Total: 06:42 hrs)
IN
11:43:37 am
16 Mar 2026
SQL_Swipes
Info
OUT
14:51:23 pm
16 Mar 2026
SQL_Swipes
Info
Actual Hours : 03 hrs 08 mins
IN
14:54:16 pm
16 Mar 2026
SQL_Swipes
Info
OUT
18:01:26 pm
16 Mar 2026
SQL_Swipes
Info
Actual Hours : 03 hrs 07 mins
IN
18:23:26 pm
16 Mar 2026
SQL_Swipes
Info
OUT
18:50:20 pm
16 Mar 2026
SQL_Swipes
Info
Actual Hours : 00 hrs 27 mins
IN
18:59:15 pm
16 Mar 2026
Actual Hours : 00 hrs 00 mins`;

  document.getElementById('sampleBtn').addEventListener('click', () => {
    document.getElementById('inputArea').value = sampleText;
  });

  document.getElementById('calcBtn').addEventListener('click', () => {
    const raw = document.getElementById('inputArea').value.trim();
    if (!raw) return alert('Paste the swipe text first.');
    try {
      const { firstIn, insideTotal, outsideTotal, requiredWorkMin, logout, events } = parseAndCalculate(raw);

      document.getElementById('firstIn').textContent = formatDT(firstIn);
      document.getElementById('worked').textContent = formatDuration(insideTotal);
      document.getElementById('outside').textContent = formatDuration(outsideTotal);
      document.getElementById('requiredWork').textContent = minutesToHHMM(requiredWorkMin);
      const remainingMin = Math.max(0, Math.ceil(requiredWorkMin - (insideTotal / 60000)));
      document.getElementById('remaining').textContent = minutesToHHMM(remainingMin);
      document.getElementById('remainingMin').textContent = remainingMin + ' min';
      document.getElementById('logout').textContent = formatDT(logout);

      // Timeline
      const body = document.getElementById('timelineBody');
      body.innerHTML = '';
      for (const ev of events) {
        const row = document.createElement('div');
        row.className = 'tl-row';
        const typeClass = ev.type === 'IN' ? 'in' : ev.type === 'OUT' ? 'out' : 'span';
        row.innerHTML = `
          <span class="tl-type ${typeClass}">${ev.type}</span>
          <span class="tl-ts">${formatDT(ev.dt)}</span>
          <span class="tl-dur">${ev.duration ? formatDuration(ev.duration) : '—'}</span>`;
        body.appendChild(row);
      }

      // Show output
      const out = document.getElementById('output');
      out.style.display = 'block';
      out.style.animation = 'none';
      requestAnimationFrame(() => { out.style.animation = ''; });

      // Start live countdown
      logoutTarget = logout;
      dayStartTime = firstIn;
      alreadyAlerted = false;
      startCountdown();

    } catch (e) {
      console.error(e);
      alert('Could not parse input — make sure it contains IN/OUT lines followed by time and date.');
    }
  });

  // ── Countdown ──────────────────────────────────────────────────────

  function startCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);
    tickCountdown(); // immediate first tick
    countdownInterval = setInterval(tickCountdown, 1000);
  }

  function tickCountdown() {
    const now = Date.now();
    const remaining = logoutTarget - now;
    const card = document.getElementById('countdownCard');
    const fill = document.getElementById('progressFill');
    const countdownEl = document.getElementById('countdown');

    // Progress bar — fraction of the work day elapsed
    const totalMs = logoutTarget - dayStartTime;
    const elapsed = now - dayStartTime;
    const pct = Math.min(100, Math.max(0, (elapsed / totalMs) * 100));
    fill.style.width = pct + '%';

    if (remaining <= 0) {
      // Done!
      countdownEl.textContent = '00:00:00';
      countdownEl.classList.remove('ticking');
      card.classList.remove('warn');
      card.classList.add('done');
      clearInterval(countdownInterval);

      if (!alreadyAlerted) {
        alreadyAlerted = true;
        showToast('🚪 Time to logout!');
      }
      return;
    }

    // Format HH:MM:SS
    const totalSec = Math.ceil(remaining / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    countdownEl.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    countdownEl.classList.add('ticking');

    // Warning state — last 30 minutes
    if (remaining <= 30 * 60 * 1000) {
      card.classList.add('warn');
    } else {
      card.classList.remove('warn');
    }
    card.classList.remove('done');
  }

  // ── Toast ──────────────────────────────────────────────────────────

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    // Auto-dismiss after 8 seconds
    setTimeout(() => {
      toast.classList.remove('show');
    }, 8000);
  }

  // ── Core logic ──────────────────────────────────────────────────────

  function parseAndCalculate(raw) {
    const lines = raw.split(/\r?\n/).map(s => s.trim()).filter(s => s !== '');
    const events = [];
    for (let i = 0; i < lines.length; i++) {
      const l = lines[i].toUpperCase();
      if (l === 'IN' || l === 'OUT') {
        events.push({ type: l, timeText: lines[i + 1] || '', dateText: lines[i + 2] || '' });
        i += 2;
      }
    }
    if (!events.length) throw new Error('No IN/OUT events found.');

    const parsed = events.map(e => ({ type: e.type, dt: parseTimeDate(e.timeText, e.dateText) }));

    let insideMs = 0, outsideMs = 0;
    const timeline = [];
    for (let i = 0; i < parsed.length; i++) {
      const cur = parsed[i];
      timeline.push({ type: cur.type, dt: cur.dt, duration: null });
      const next = parsed[i + 1];
      if (!next) continue;
      if (cur.type === 'IN' && next.type === 'OUT') {
        const d = next.dt - cur.dt;
        insideMs += d;
        timeline.push({ type: 'IN->OUT', dt: next.dt, duration: d });
      } else if (cur.type === 'OUT' && next.type === 'IN') {
        const d = next.dt - cur.dt;
        outsideMs += d;
        timeline.push({ type: 'OUT->IN', dt: next.dt, duration: d });
      }
    }

    const outsideMinutesCeil = Math.ceil(outsideMs / 60000);
    const extra = Math.max(0, outsideMinutesCeil - 40);
    const requiredWorkMin = 8 * 60 + 20 + extra;

    const firstIn = parsed.find(p => p.type === 'IN');
    if (!firstIn) throw new Error('No IN found to use as day start.');
    const logout = new Date(firstIn.dt.getTime() + requiredWorkMin * 60000 + outsideMs);

    return { firstIn: firstIn.dt, insideTotal: insideMs, outsideTotal: outsideMs, requiredWorkMin, logout, events: timeline };
  }

  function parseTimeDate(timeText, dateText) {
    const time = (timeText || '').trim();
    const date = (dateText || '').trim();
    const tryParse = s => { const t = Date.parse(s); return Number.isNaN(t) ? null : new Date(t); };
    const tparts = time.match(/(\d{1,2}):(\d{2}):(\d{2})\s*(am|pm)?/i);
    if (!tparts) throw new Error('Time parse failed: ' + time);
    let hh = parseInt(tparts[1], 10);
    const mm = tparts[2], ss = tparts[3];
    const ampm = tparts[4] ? tparts[4].toLowerCase() : null;
    if (ampm) {
      if (ampm === 'pm' && hh < 12) hh += 12;
      if (ampm === 'am' && hh === 12) hh = 0;
    }
    const pad2 = n => (n < 10 ? '0' + n : '' + n);
    const candidates = [];
    if (date) candidates.push(`${date} ${pad2(hh)}:${mm}:${ss}`);
    candidates.push(`${pad2(hh)}:${mm}:${ss} ${date}`);
    let parsed = null;
    for (const c of candidates) { const d = tryParse(c); if (d) { parsed = d; break; } }
    if (!parsed) {
      const m = date.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
      if (m) parsed = new Date(`${m[3]}-${monthNameToNumber(m[2])}-${m[1]}T${pad2(hh)}:${mm}:${ss}`);
    }
    if (!parsed) throw new Error('Date parse failed for: ' + date + ' / ' + time);
    return parsed;
  }

  function monthNameToNumber(m) {
    const map = { jan:1, feb:2, mar:3, apr:4, may:5, jun:6, jul:7, aug:8, sep:9, oct:10, nov:11, dec:12 };
    return map[(m || '').substr(0, 3).toLowerCase()] || 1;
  }

  function formatDuration(ms) {
    const s = Math.floor(ms / 1000);
    return `${pad(Math.floor(s / 3600))}:${pad(Math.floor((s % 3600) / 60))}:${pad(s % 60)}`;
  }
  function minutesToHHMM(min) { return `${pad(Math.floor(min / 60))}:${pad(min % 60)}`; }
  function pad(n) { return (n < 10 ? '0' : '') + n; }
  function formatDT(d) {
    if (!d) return '—';
    return new Intl.DateTimeFormat(undefined, {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
    }).format(d);
  }
</script>
</body>
</html>
